aid: pulsoid
name: Pulsoid
description: Pulsoid enables real-time heart rate data transmission from peripherals (BLE heart rate monitors, smartwatches,
  etc.) to clients. The Pulsoid API allows reading and writing real-time heart rate data, accessing statistics, and managing
  widgets and profile.
