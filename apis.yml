apis:
- aid: pulsoid:pulsoid
  name: Pulsoid
  description: Pulsoid enables real-time heart rate data transmission from peripherals (BLE heart rate monitors, smartwatches,
    etc.) to clients. The REST API provides endpoints to validate tokens, read latest heart rate, submit heart rate data,
    retrieve statistics, manage widgets, and access user profile. Real-time streaming is delivered via WebSocket endpoints.
