naftiko: 1.0.0-alpha2
info:
  label: Pulsoid API — Token
  description: 'Pulsoid API — Token. 1 operations. Lead operation: Validate authorization token. Self-contained Naftiko capability
    covering one Pulsoid business surface.'
  tags:
  - Pulsoid
  - Token
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PULSOID_API_KEY: PULSOID_API_KEY
capability:
  consumes:
  - type: http
    namespace: pulsoid-token
    baseUri: https://dev.pulsoid.net
    description: Pulsoid API — Token business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-token-validate
      path: /api/v1/token/validate
      operations:
      - name: validatetoken
        method: GET
        description: Validate authorization token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PULSOID_API_KEY}}'
  exposes:
  - type: rest
    namespace: pulsoid-token-rest
    port: 8080
    description: REST adapter for Pulsoid API — Token. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v1/token/validate
      name: api-v1-token-validate
      description: REST surface for api-v1-token-validate.
      operations:
      - method: GET
        name: validatetoken
        description: Validate authorization token
        call: pulsoid-token.validatetoken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pulsoid-token-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pulsoid API — Token. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: validate-authorization-token
      description: Validate authorization token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pulsoid-token.validatetoken
      outputParameters:
      - type: object
        mapping: $.
