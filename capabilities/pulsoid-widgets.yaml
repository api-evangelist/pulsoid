naftiko: 1.0.0-alpha2
info:
  label: Pulsoid API — Widgets
  description: 'Pulsoid API — Widgets. 3 operations. Lead operation: List widgets. Self-contained Naftiko capability covering
    one Pulsoid business surface.'
  tags:
  - Pulsoid
  - Widgets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PULSOID_API_KEY: PULSOID_API_KEY
capability:
  consumes:
  - type: http
    namespace: pulsoid-widgets
    baseUri: https://dev.pulsoid.net
    description: Pulsoid API — Widgets business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-widgets
      path: /api/v1/widgets
      operations:
      - name: listwidgets
        method: GET
        description: List widgets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createwidget
        method: POST
        description: Create widget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-widgets-widgetId
      path: /api/v1/widgets/{widgetId}
      operations:
      - name: updatewidget
        method: POST
        description: Update widget configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: widgetId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PULSOID_API_KEY}}'
  exposes:
  - type: rest
    namespace: pulsoid-widgets-rest
    port: 8080
    description: REST adapter for Pulsoid API — Widgets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v1/widgets
      name: api-v1-widgets
      description: REST surface for api-v1-widgets.
      operations:
      - method: GET
        name: listwidgets
        description: List widgets
        call: pulsoid-widgets.listwidgets
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createwidget
        description: Create widget
        call: pulsoid-widgets.createwidget
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/widgets/{widgetid}
      name: api-v1-widgets-widgetid
      description: REST surface for api-v1-widgets-widgetId.
      operations:
      - method: POST
        name: updatewidget
        description: Update widget configuration
        call: pulsoid-widgets.updatewidget
        with:
          widgetId: rest.widgetId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pulsoid-widgets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pulsoid API — Widgets. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-widgets
      description: List widgets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pulsoid-widgets.listwidgets
      outputParameters:
      - type: object
        mapping: $.
    - name: create-widget
      description: Create widget
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pulsoid-widgets.createwidget
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-widget-configuration
      description: Update widget configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: pulsoid-widgets.updatewidget
      with:
        widgetId: tools.widgetId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
