naftiko: 1.0.0-alpha2
info:
  label: Pulsoid API — Statistics
  description: 'Pulsoid API — Statistics. 1 operations. Lead operation: Read heart rate statistics. Self-contained Naftiko
    capability covering one Pulsoid business surface.'
  tags:
  - Pulsoid
  - Statistics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PULSOID_API_KEY: PULSOID_API_KEY
capability:
  consumes:
  - type: http
    namespace: pulsoid-statistics
    baseUri: https://dev.pulsoid.net
    description: Pulsoid API — Statistics business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-statistics
      path: /api/v1/statistics
      operations:
      - name: getstatistics
        method: GET
        description: Read heart rate statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.PULSOID_API_KEY}}'
  exposes:
  - type: rest
    namespace: pulsoid-statistics-rest
    port: 8080
    description: REST adapter for Pulsoid API — Statistics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v1/statistics
      name: api-v1-statistics
      description: REST surface for api-v1-statistics.
      operations:
      - method: GET
        name: getstatistics
        description: Read heart rate statistics
        call: pulsoid-statistics.getstatistics
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pulsoid-statistics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pulsoid API — Statistics. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: read-heart-rate-statistics
      description: Read heart rate statistics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pulsoid-statistics.getstatistics
      outputParameters:
      - type: object
        mapping: $.
